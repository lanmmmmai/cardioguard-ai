<!--
  ============================================================================
  CardioGuard AI – Entry HTML
  ============================================================================
  @purpose      SPA entry point that mounts the React root and registers the
                Service Worker for PWA installability.
  @workflow     1. Render <div id="root" /> as the React mount target.
                2. Load /src/main.tsx as the ES module entry.
                3. On window load, register /sw.js for offline/install support.
  @relationships
    - /src/main.tsx       → React root render
    - /sw.js              → Service Worker for PWA caching
    - /manifest.json      → Web App Manifest for "Add to Home Screen"
  ============================================================================
-->
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0e12" />
    <title>__SEO_TITLE__</title>
    <meta name="description" content="__SEO_DESCRIPTION__" />
    <link rel="canonical" href="__SEO_URL__" />

    <!-- OpenGraph SEO Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="__SEO_SITE_NAME__" />
    <meta property="og:url" content="__SEO_URL__" />
    <meta property="og:title" content="__SEO_TITLE__" />
    <meta property="og:description" content="__SEO_DESCRIPTION__" />
    <meta property="og:image" content="__SEO_IMAGE__" />
    <meta property="og:image:secure_url" content="__SEO_IMAGE__" />
    <meta property="og:image:type" content="__SEO_IMAGE_TYPE__" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="__SEO_TITLE__" />

    <!-- Twitter Card SEO Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="__SEO_URL__" />
    <meta name="twitter:title" content="__SEO_TITLE__" />
    <meta name="twitter:description" content="__SEO_DESCRIPTION__" />
    <meta name="twitter:image" content="__SEO_IMAGE__" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__CARDIOGUARD_API_URL__ = "__CARDIOGUARD_API_URL_PLACEHOLDER__";
      window.__CARDIOGUARD_WS_URL__ = "__CARDIOGUARD_WS_URL_PLACEHOLDER__";
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Simple Service Worker registration for PWA installability
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('SW registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
