<!--
  ============================================================================
  CardioGuard AI – Entry HTML
  ============================================================================
  @purpose      SPA entry point that mounts the React root and registers the
                Service Worker for PWA installability.
  @workflow     1. Render <div id="root" /> as the React mount target.
                2. Load /src/main.tsx as the ES module entry.
                3. On window load, register /sw.js for offline/install support.
  @relationships
    - /src/main.tsx       → React root render
    - /sw.js              → Service Worker for PWA caching
    - /manifest.json      → Web App Manifest for "Add to Home Screen"
  ============================================================================
-->
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0e12" />
    <meta name="description" content="CardioGuard AI - Hệ thống giám sát sức khỏe tim mạch thời gian thực. Theo dõi nhịp tim, SpO2, huyết áp và điện tâm đồ ECG trực tuyến." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>CardioGuard AI - Giám sát sức khỏe tim mạch thời gian thực</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Simple Service Worker registration for PWA installability
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('SW registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
