name: CI/CD — CardioGuard AI

on:
  push:
    branches: [main, phuc-bang]
  pull_request:
    branches: [main, phuc-bang]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Backend Checks ────────────────────────────────────────
  backend-check:
    name: Backend — Lint & Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/postgres' }}
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-secret-key-please-change-this-to-a-real-secret' }}
      HAS_REAL_DATABASE_CREDENTIALS: ${{ secrets.DATABASE_URL != '' && secrets.SECRET_KEY != '' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (py_compile)
        run: python -m compileall app/ -q

      - name: Check imports resolve
        run: python -c "from app.main import app; print('FastAPI app loaded OK')"

      - name: Verify migration runner
        if: ${{ env.HAS_REAL_DATABASE_CREDENTIALS == 'true' }}
        run: python -c "import scripts.run_all_migrations; print('Migration runner OK')"

  # ── Frontend Checks ───────────────────────────────────────
  frontend-check:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web_frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://cardioguard-backend.onrender.com
          VITE_WS_URL: wss://cardioguard-backend.onrender.com/ws/realtime

  # ── Docker Build Check ────────────────────────────────────
  docker-check:
    name: Docker — Build Verify
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t cardioguard-backend:test .

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=https://cardioguard-backend.onrender.com \
            --build-arg VITE_WS_URL=wss://cardioguard-backend.onrender.com/ws/realtime \
            -f web_frontend/Dockerfile -t cardioguard-web:test .

  # ── Auto-Deploy Notification ──────────────────────────────
  deploy-notify:
    name: Deploy — Notify
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check, docker-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Production deploy triggered
        run: |
          echo "=== PRODUCTION DEPLOY TRIGGERED ==="
          echo "Branch: main"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "Render and Vercel will auto-deploy from this push."
          echo "Backend:  https://cardioguard-backend.onrender.com"
          echo "Frontend: https://cardioguard-dashboard.vercel.app"
          echo ""
          echo "phuc-bang branch: Dev/staging only, no auto-deploy."
