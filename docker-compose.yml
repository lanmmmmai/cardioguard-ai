name: cardioguard-ai

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: cardioguard-ai-backend:local
    env_file:
      - path: ./.env
        required: false
      - path: ./backend/.env
        required: false
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: web_frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws/realtime}
    image: cardioguard-ai-web:local
    depends_on:
      backend:
        condition: service_started
    environment:
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://giatky.site}
    ports:
      - "5173:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
