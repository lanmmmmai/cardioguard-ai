org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# KGP 2.x strict JVM-target validation — "warning" keeps the build green even if
# a third-party plugin (flutter_facebook_auth, etc.) still declares Java 11 in its
# own build.gradle while the Kotlin toolchain runs at 17.
# The root build.gradle.kts subprojects block overrides both Java and Kotlin to 17,
# but this flag is a safety net in case any plugin resists the override.
kotlin.jvm.target.validation.mode=warning

# Daemon configuration
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
kotlin.incremental=true
